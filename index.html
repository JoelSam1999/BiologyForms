<!DOCTYPE html>
<html>
<head>
  <title>Quiz App</title>

  <!-- ✅ Mobile responsiveness -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: auto;
      padding: 15px;
      background: #f5f7fb;
      font-size: 16px;
      line-height: 1.5;
    }

    h1, h2 {
      text-align: center;
    }

    .question {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    label {
      display: block;
      padding: 12px;
      margin-bottom: 8px;
      background: #fff;
      border-radius: 8px;
      border: 1px solid #ddd;
      cursor: pointer;
    }

    input[type="radio"] {
      margin-right: 10px;
      transform: scale(1.3);
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 14px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    .submit-btn {
      position: sticky;
      bottom: 10px;
      width: 100%;
      margin-top: 20px;
    }

    #result {
      margin-top: 20px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }

    .progress {
      text-align: center;
      margin-bottom: 15px;
      color: #555;
    }
  </style>
</head>

<body>

<h1>Quiz Assessment</h1>

<div id="quiz">Loading questions...</div>
<div id="result"></div>

<script src="script.js"></script>

</body>
</html>
